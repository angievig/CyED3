# This file was created automatically with `jupyter-book init --gh-pages`
# Ensure your GitHub Pages settings are set to deploy with GitHub Actions.

name: Jupyter Book (via myst) GitHub Pages Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # If your site is https://username.github.io/repository-name
  BASE_URL: /${{ github.event.repository.name }}

  # If your site is https://username.github.io
  # use this instead:
  # BASE_URL: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Install Jupyter Book via npm
        run: npm install -g jupyter-book

      - name: Build HTML assets
        run: jupyter-book build --html --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
